    SavedLocationResponse:
      type: object
      properties:
        location_code:
          description: |-
            The user-supplied identifier for the location.


            E.g. `4t855453234t5623`
          type: string
          examples:
            - 4t855453234t5623
          title: Location Code
        name:
          description: |-
            The user defined name of the Saved Location set in the create location call.


            E.g. `My Parking Building`
          type: string
          examples:
            - My Parking Building
          title: Name
        labels:
          description: |-
            A list of user defined labels for the location.


            E.g.: `["test", "retail"]`
          type: array
          items:
            type: string
          examples:
            - test
            - retail
          title: Labels
        geojson:
          description: 'An object containing the geographic information about a location. Represents the geometry associated with the event in the [GeoJSON format](https://geojson.org/).'
          $ref: '#/components/schemas/GeoJson-Output'
          examples:
            - type: Feature
              properties:
                radius: 3.17
                radius_unit: mi
              geometry:
                type: Point
                coordinates:
                  - -122.3816274
                  - 37.61911449999999
        place_ids:
          description: |-
            An array of place ids (see the [Places API](https://docs.predicthq.com/api/places/search-places)) for locations that are defined as covering an area (see City, State, Country locations) rather than a point and radius.


            E.g. `[2750405]`
          type: array
          items:
            type: integer
          examples:
            - - 2750405
          title: Place Ids
        formatted_address:
          description: |-
            The address of the location. This can be supplied when created a location. 
            If it's not supplied it will be populated by a reverse geocode.


            E.g. 
              ```json
                {
                  "formatted_address": "666 Mission St, San Francisco, CA 94105, USA",
                }
              ```
          type: string
          examples:
            - '666 Mission St, San Francisco, CA 94105, USA'
          title: Formatted Address
        industry:
          description: The industry of your business.
          $ref: '#/components/schemas/Industry'
        origin_geojson:
          description: |-
            An object containing the geographic information about a location. Represents the location of your business
            in the [GeoJSON format](https://geojson.org/).
          $ref: '#/components/schemas/OriginGeoJson'
          examples:
            - type: Feature
              geometry:
                type: Point
                coordinates:
                  - -122.3816274
                  - 37.61911449999999
        create_dt:
          description: |-
            The creation date time for the location in [ISO 8601 format](https://en.wikipedia.org/wiki/ISO_8601).


            E.g. `2022-04-26T11:46:24+00:00`
          type: string
          format: date-time
          examples:
            - '2022-04-26T11:46:24+00:00'
          title: Create Dt
        update_dt:
          description: |-
            The last update date time for the location in [ISO 8601 format](https://en.wikipedia.org/wiki/ISO_8601).


            E.g. `2022-04-26T11:46:24+00:00`
          type: string
          format: date-time
          examples:
            - '2022-04-26T11:46:24+00:00'
          title: Update Dt
        enrich_dt:
          description: |-
            The date time the location was last enriched in [ISO 8601 format](https://en.wikipedia.org/wiki/ISO_8601).


            E.g. `2022-04-26T11:46:25+00:00`
          type: string
          format: date-time
          examples:
            - '2022-04-26T11:46:25+00:00'
          title: Enrich Dt
        insights_dt:
          description: |-
            The date/time insights were last calculated for the location in [ISO 8601 format](https://en.wikipedia.org/wiki/ISO_8601).


            E.g. `2022-04-26T11:46:25+00:00`
          type: string
          format: date-time
          examples: '2022-04-26T11:46:25+00:00'
          title: Insights Dt
        user_id:
          description: |-
            The ID of the user who created the saved location. 
            This is present for location created in the WebApp. 
            For locations created via the API this field will not be populated.


            E.g. `hjqkKozgS8mm`
          type: string
          examples:
            - hjqkKozgS8mm
          title: User Id
        subscription_valid_types:
          description: |-
            The value is a list of different (subscription) types that this location is valid for. 
            The possible values are `events`, `broadcasts`, `notifications`, `features_api`.


            It is possible to create locations outside of what your subscription has access to. 
            In this case this field will be empty and you will not be able to view events for the location


            E.g. `["events"]`
          type: array
          items:
            $ref: '#/components/schemas/SubscriptionValidType'
          examples:
            - events
            - features_api
          title: Subscription Valid Types
        location_type:
          $ref: '#/components/schemas/LocationType'
        status:
          description: |-
            Reflects if a location has been updated by the enrichment process. When a location is initially created its status will be `pending`.


            After the enrichment process has updated the location populating `summary_insights` and other fields the status will be `active`.


            Typically locations only have the `pending` status for a short time.
                  
                  
            E.g. `active`
          $ref: '#/components/schemas/SavedLocationStatus'
          examples:
            - active
        summary_insights:
          description: |-
            This object contains the saved locations stats.
            This includes values for each of the 4 stats as well as the date_range field.
            The stats reflect the number of events and attend happening for the location.

            The date range field includes the start and end datetime for the period that the stats have been calculated for.
          type: array
          items:
            $ref: '#/components/schemas/SummaryInsights'
          title: Summary Insights
        places:
          description: 'This is a list of (geonames) Places. It is based on the lowest level place_id in the [place_hierarchies](https://docs.predicthq.com/getting-started/guides/geolocation-guides/understanding-place-hierarchies). It will usually only contain 1 item in the list but will always be a list.'
          type: array
          items:
            $ref: '#/components/schemas/Place'
          title: Places
        location_id:
          description: |-
            The autogenerated identifier for the saved location.


            E.g. `8gZ2rn8BRcTjM_3SWdjP`
          type: string
          examples:
            - 8gZ2rn8BRcTjM_3SWdjP
          title: Location Id
        additional_details:
          $ref: '#/components/schemas/AdditionalDetails'
      examples:
        - location_id: 7sdevIveOuIQmP0EL1lZoQ
          create_dt: '2025-11-17T19:11:43+00:00'
          update_dt: '2025-11-17T19:11:43+00:00'
          enrich_dt: '2025-11-17T19:11:45+00:00'
          insights_dt: '2025-11-17T19:11:46+00:00'
          name: San Francisco
          place_ids:
            - 5391959
          formatted_address: 'San Francisco, San Francisco County, California, United States [Locality]'
          places:
            - place_id: 5391959
              type: locality
              name: San Francisco
              county: San Francisco County
              region: California
              country: US
              geojson:
                type: Feature
                geometry:
                  type: Point
                  coordinates:
                    - -122.41942
                    - 37.77493
          summary_insights:
            - date_range:
                type: next_90d
                start_dt: '2025-11-17T19:11:46+00:00'
                end_dt: '2026-02-15T19:11:46+00:00'
              phq_attendance_sum: 2670581
              attended_event_count: 2568
              non_attended_event_count: 113
              unscheduled_event_count: 2
              pes_total_sum: 232505682
              pes_accommodation_sum: 88335769
              pes_hospitality_sum: 108671383
              pes_transportation_sum: 35496672
          subscription_valid_types:
            - events
            - features_api
          status: active
      required:
        - create_dt
        - update_dt
        - status
        - location_id
      title: SavedLocationResponse
