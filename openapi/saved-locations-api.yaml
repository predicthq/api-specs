    TimeSlot-Input:
      description: |-
        Time slot with dual field naming: technical precision internally, user-friendly API externally.

        Field configuration creates different interfaces:
        - Internal usage: Code accesses .gte/.lt attributes (technical, precise field names)
        - Model input: Accepts both "gte"/"open" and "lt"/"close" via AliasChoices validation
        - API output: FastAPI serializes as "open"/"close" using by_alias=True (user-friendly field names)

        This separation allows internal code to use precise technical terminology while
        providing an intuitive customer-facing API interface.
      type: object
      properties:
        gte:
          description: 'Opening time in HH:MM format (00:00-23:59)'
          type: string
          pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
          title: Gte
        lt:
          description: 'Closing time in HH:MM format (00:00-24:00)'
          type: string
          pattern: '^(([01]?[0-9]|2[0-3]):[0-5][0-9]|24:00)$'
          title: Lt
      required:
        - gte
        - lt
      title: TimeSlot
    TimeSlot-Output:
      description: |-
        Time slot with dual field naming: technical precision internally, user-friendly API externally.

        Field configuration creates different interfaces:
        - Internal usage: Code accesses .gte/.lt attributes (technical, precise field names)
        - Model input: Accepts both "gte"/"open" and "lt"/"close" via AliasChoices validation
        - API output: FastAPI serializes as "open"/"close" using by_alias=True (user-friendly field names)

        This separation allows internal code to use precise technical terminology while
        providing an intuitive customer-facing API interface.
      type: object
      properties:
        open:
          description: 'Opening time in HH:MM format (00:00-23:59)'
          type: string
          pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
          title: Open
        close:
          description: 'Closing time in HH:MM format (00:00-24:00)'
          type: string
          pattern: '^(([01]?[0-9]|2[0-3]):[0-5][0-9]|24:00)$'
          title: Close
      required:
        - open
        - close
      title: TimeSlot
    UpdateOpeningHoursRequest:
