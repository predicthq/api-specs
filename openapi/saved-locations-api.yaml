openapi: 3.1.0
info:
  title: PredictHQ Saved Locations API
  description: |-
    Saved Locations are persistent, user-defined geographic entities that serve as reusable identifiers across PredictHQ’s platform. Defined using a name and a GeoJSON location shape, they may also include an external ID and optional labels for filtering or grouping.


    This API is currently in beta.
  version: 1.0.0
  license:
    name: MIT
    url: 'https://opensource.org/licenses/MIT'
  termsOfService: 'https://www.predicthq.com/legal/terms'
security:
  - BearerAuth: []
tags:
  - name: Saved Locations API
    externalDocs:
      url: 'https://docs.predicthq.com/api/saved-locations/overview'
      description: Saved Locations API Docs
servers:
  - url: 'https://api.predicthq.com'
externalDocs:
  url: 'https://docs.predicthq.com'
  description: PredictHQ Tech Docs
x-hideTryItPanel: true
paths:
  /v1/saved-locations:
    get:
      operationId: get_locations_public_locations_get
      summary: Search Saved Locations
      parameters:
        - name: q
          in: query
          description: |-
            A full-text search query that searches across the following fields:
            - `name`
            - `description`
            - `location_code`
            - `formatted_address`
            - `labels`


            E.g. `q=alabama`
          required: false
          schema:
            type: string
            title: Q
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: sort
          in: query
          description: |-
            A comma-separated list of fields to sort results by. Use the `-` prefix to sort descending.


            E.g.: `?sort=-created`
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - created
                - '-created'
                - address
                - '-address'
                - name
                - '-name'
                - updated
                - '-updated'
                - attended_event_count
                - '-attended_event_count'
                - non_attended_event_count
                - '-non_attended_event_count'
                - phq_attendance_sum
                - '-phq_attendance_sum'
                - pes_accommodation_sum
                - '-pes_accommodation_sum'
                - pes_hospitality_sum
                - '-pes_hospitality_sum'
                - pes_total_sum
                - '-pes_total_sum'
                - pes_transportation_sum
                - '-pes_transportation_sum'
                - unscheduled_event_count
                - '-unscheduled_event_count'
                - next_90d.attended_event_count
                - '-next_90d.attended_event_count'
                - next_90d.non_attended_event_count
                - '-next_90d.non_attended_event_count'
                - next_90d.pes_accommodation_sum
                - '-next_90d.pes_accommodation_sum'
                - next_90d.pes_hospitality_sum
                - '-next_90d.pes_hospitality_sum'
                - next_90d.pes_total_sum
                - '-next_90d.pes_total_sum'
                - next_90d.pes_transportation_sum
                - '-next_90d.pes_transportation_sum'
                - next_90d.phq_attendance_sum
                - '-next_90d.phq_attendance_sum'
                - next_90d.unscheduled_event_count
                - '-next_90d.unscheduled_event_count'
                - attended_events
                - '-attended_events'
                - non_attended_events
                - '-non_attended_events'
                - attendance
                - '-attendance'
                - unscheduled_events
                - '-unscheduled_events'
            default:
              - created
          explode: false
          style: form
        - name: location_id
          in: query
          description: |-
            A comma-separated string consisting of a list of 1 or more `location_id`'s.


            E.g. `?location_id=6TxvEapQeDzq9y_UKVRQCQ`
          required: false
          schema:
            type: array
            items:
              type: string
          explode: false
          style: form
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedLocationsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      tags:
        - Saved Locations API
    post:
      operationId: save_location_public_locations_post
      summary: Create a Saved Location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSavedLocationRequest'
      responses:
        '201':
          description: Location created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  location_id:
                    type: string
                required:
                  - location_id
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      tags:
        - Saved Locations API
  '/v1/saved-locations/{location_id}':
    get:
      operationId: get_location_public_locations__location_id__get
      summary: Get a Saved Location
      parameters:
        - name: location_id
          in: path
          description: An existing Saved Location ID.
          required: true
          schema:
            type: string
            title: Location Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedLocationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      tags:
        - Saved Locations API
    put:
      operationId: replace_location_data_public_locations__location_id__put
      summary: Update (replace) a Saved Location
      parameters:
        - name: location_id
          in: path
          description: An existing Saved Location ID.
          required: true
          schema:
            type: string
            title: Location Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSavedLocationRequest'
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      tags:
        - Saved Locations API
    delete:
      operationId: delete_location_public_locations__location_id__delete
      summary: Delete a Saved Location
      parameters:
        - name: location_id
          in: path
          description: An existing Saved Location ID.
          required: true
          schema:
            type: string
            title: Location Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      tags:
        - Saved Locations API
  '/v1/saved-locations/{location_id}/insights/events':
    get:
      operationId: get_location_events_public_locations__location_id__insights_events_get
      summary: Search Events for a Saved Location
      description: 'Please refer to the [Events API](https://docs.predicthq.com/api/events/search-events) docs for the available query parameters in addition to those listed below.'
      parameters:
        - name: location_id
          in: path
          description: An existing Saved Location ID.
          required: true
          schema:
            type: string
            title: Location Id
        - name: date_range_type
          in: query
          description: |-
            Date range to fetch events for.


            Currently the only supported date ranges are:


            - `next_90d`
          required: false
          schema:
            $ref: '#/components/schemas/DateRangeType'
            title: Date Range Type
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhqEvents'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      tags:
        - Saved Locations API
  '/v1/saved-locations/{location_id}/opening-hours':
    post:
      operationId: create_opening_hours_public_locations__location_id__opening_hours_post
      summary: Create opening hours for a location
      parameters:
        - name: location_id
          in: path
          required: true
          schema:
            type: string
            title: Location Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOpeningHoursRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOpeningHoursResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      tags:
        - Saved Locations API
    get:
      operationId: search_opening_hours_public_locations__location_id__opening_hours_get
      summary: List opening hours for a location
      parameters:
        - name: location_id
          in: path
          required: true
          schema:
            type: string
            title: Location Id
        - name: active_from
          in: query
          required: false
          schema:
            type: string
            format: date
            title: Active From
        - name: active_to
          in: query
          required: false
          schema:
            type: string
            format: date
            title: Active To
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpeningHoursSearchResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      tags:
        - Saved Locations API
  '/v1/saved-locations/{location_id}/opening-hours/{opening_hours_id}':
    get:
      operationId: get_opening_hours_public_locations__location_id__opening_hours__opening_hours_id__get
      summary: Get specific opening hours
      parameters:
        - name: location_id
          in: path
          required: true
          schema:
            type: string
            title: Location Id
        - name: opening_hours_id
          in: path
          required: true
          schema:
            type: string
            title: Opening Hours Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpeningHoursResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      tags:
        - Saved Locations API
    put:
      operationId: update_opening_hours_public_locations__location_id__opening_hours__opening_hours_id__put
      summary: Update opening hours
      parameters:
        - name: location_id
          in: path
          required: true
          schema:
            type: string
            title: Location Id
        - name: opening_hours_id
          in: path
          required: true
          schema:
            type: string
            title: Opening Hours Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOpeningHoursRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpeningHours'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      tags:
        - Saved Locations API
    delete:
      operationId: delete_opening_hours_public_locations__location_id__opening_hours__opening_hours_id__delete
      summary: Delete opening hours
      parameters:
        - name: location_id
          in: path
          required: true
          schema:
            type: string
            title: Location Id
        - name: opening_hours_id
          in: path
          required: true
          schema:
            type: string
            title: Opening Hours Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      tags:
        - Saved Locations API
  '/v1/saved-locations/{location_id}/closures':
    post:
      operationId: create_closure_public_locations__location_id__closures_post
      summary: Create a closure for a location
      parameters:
        - name: location_id
          in: path
          required: true
          schema:
            type: string
            title: Location Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClosureRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateClosureResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      tags:
        - Saved Locations API
    get:
      operationId: search_closures_public_locations__location_id__closures_get
      summary: List closures for a location
      parameters:
        - name: location_id
          in: path
          required: true
          schema:
            type: string
            title: Location Id
        - name: active_from
          in: query
          required: false
          schema:
            type: string
            format: date
            title: Active From
        - name: active_to
          in: query
          required: false
          schema:
            type: string
            format: date
            title: Active To
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClosuresSearchResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      tags:
        - Saved Locations API
  '/v1/saved-locations/{location_id}/closures/{closure_id}':
    get:
      operationId: get_closure_public_locations__location_id__closures__closure_id__get
      summary: Get specific closure
      parameters:
        - name: location_id
          in: path
          required: true
          schema:
            type: string
            title: Location Id
        - name: closure_id
          in: path
          required: true
          schema:
            type: string
            title: Closure Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Closure'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      tags:
        - Saved Locations API
    delete:
      operationId: delete_closure_public_locations__location_id__closures__closure_id__delete
      summary: Delete closure
      parameters:
        - name: location_id
          in: path
          required: true
          schema:
            type: string
            title: Location Id
        - name: closure_id
          in: path
          required: true
          schema:
            type: string
            title: Closure Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      tags:
        - Saved Locations API
components:
  parameters:
    LimitParam:
      name: limit
      in: query
      description: Limit the number of results.
      required: false
      schema:
        type: integer
        default: 10
    OffsetParam:
      name: offset
      in: query
      description: Offset the results.
      required: false
      schema:
        type: integer
        default: 0
  schemas:
    AdditionalDetails:
      type: object
      properties:
        opening_hours:
          type: array
          items:
            $ref: '#/components/schemas/OpeningHourSlot-Output'
          title: Opening Hours
        closures:
          type: array
          items:
            $ref: '#/components/schemas/AdditionalDetailsClosure'
          title: Closures
      title: AdditionalDetails
    AdditionalDetailsClosure:
      type: object
      properties:
        effective_from:
          type: string
          title: Effective From
        effective_to:
          type: string
          title: Effective To
        title:
          type: string
          title: Title
      required:
        - effective_from
        - effective_to
        - title
      title: AdditionalDetailsClosure
    Closure:
      type: object
      properties:
        closure_id:
          type: string
          title: Closure Id
        location_id:
          type: string
          title: Location Id
        effective_from:
          type: string
          format: date
          title: Effective From
        effective_to:
          type: string
          format: date
          title: Effective To
        title:
          type: string
          title: Title
        create_dt:
          type: string
          format: date-time
          title: Create Dt
        update_dt:
          type: string
          format: date-time
          title: Update Dt
        status:
          default: active
          $ref: '#/components/schemas/ClosureStatus'
      required:
        - closure_id
        - location_id
        - effective_from
        - effective_to
        - title
        - create_dt
        - update_dt
      title: Closure
    ClosureResponse:
      type: object
      properties:
        closure_id:
          type: string
          title: Closure Id
        location_id:
          type: string
          title: Location Id
        effective_from:
          type: string
          format: date
          title: Effective From
        effective_to:
          type: string
          format: date
          title: Effective To
        title:
          type: string
          title: Title
        create_dt:
          type: string
          format: date-time
          title: Create Dt
        update_dt:
          type: string
          format: date-time
          title: Update Dt
      required:
        - closure_id
        - location_id
        - effective_from
        - effective_to
        - title
        - create_dt
        - update_dt
      title: ClosureResponse
    ClosureStatus:
      type: string
      enum:
        - active
        - deleted
      title: ClosureStatus
    ClosuresSearchResponse:
      type: object
      properties:
        count:
          type: integer
          title: Count
        previous:
          type: string
          title: Previous
        next:
          type: string
          title: Next
        closures:
          type: array
          items:
            $ref: '#/components/schemas/ClosureResponse'
          title: Closures
      required:
        - count
        - closures
      title: ClosuresSearchResponse
    CreateClosureRequest:
      type: object
      properties:
        effective_from:
          type: string
          format: date
          title: Effective From
        effective_to:
          type: string
          format: date
          title: Effective To
        title:
          type: string
          title: Title
      required:
        - effective_from
        - effective_to
        - title
      title: CreateClosureRequest
    CreateClosureResponse:
      type: object
      properties:
        closure_id:
          type: string
          title: Closure Id
      required:
        - closure_id
      title: CreateClosureResponse
    CreateOpeningHoursRequest:
      type: object
      properties:
        effective_from:
          type: string
          format: date
          default: '0001-01-01'
          title: Effective From
        effective_to:
          type: string
          format: date
          default: '9999-12-31'
          title: Effective To
        slots:
          type: array
          items:
            $ref: '#/components/schemas/OpeningHourSlot-Input'
          minItems: 1
          title: Slots
      required:
        - slots
      title: CreateOpeningHoursRequest
    CreateOpeningHoursResponse:
      type: object
      properties:
        opening_hours_id:
          type: string
          title: Opening Hours Id
      required:
        - opening_hours_id
      title: CreateOpeningHoursResponse
    CreateSavedLocationRequest:
      type: object
      properties:
        location_code:
          description: |-
            An optional identifier for your location.


            The intention here is to use your own identifier for the location if you have one. 
            E.g., you might have stores/hotels/etc in your system with their own ID 
            - use that ID here to make it easier to lookup the location later.
          type: string
          title: Location Code
        name:
          description: |-
            Name of the Saved Location.

            E.g. `My Location`
          type: string
          examples:
            - My Location
          title: Name
        description:
          description: Description of the location.
          type: string
          title: Description
        labels:
          description: |-
            A list of labels to help you categorize your locations.
            You can use these labels to search upon.


            **E.g.**
              ```json
                {
                  "labels": ["label1", "label2"]
                }
              ```
          type: array
          items:
            type: string
          examples:
            - test
            - retail
          title: Labels
        geojson:
          description: |-
            You can define the geolocation of the Saved Location either by GeoJSON or Place IDs.


            For the Point geometry type, we require a radius to be defined using a special set of properties on the GeoJSON record. As in the example below, these are `radius` and `radius_unit`. The radius property must be an integer or a float number up to 2 decimal places.


            Remember that GeoJSON coordinates are ordered longitude then latitude.


            Note: For Point geometry type, we strongly recommend using our [Suggested Radius API](https://docs.predicthq.com/api/suggested-radius/get-suggested-radius) to find a suitable radius value for your location and industry.
          $ref: '#/components/schemas/GeoJson-Input'
          examples:
            - type: Feature
              properties:
                radius: 3.17
                radius_unit: mi
              geometry:
                type: Point
                coordinates:
                  - -122.3816274
                  - 37.61911449999999
        place_ids:
          description: |-
            You can define the geolocation of the Saved Location either by GeoJSON or Place IDs.

            The Place IDs option is typically used when the location covers an entire city, county, state or country.

            Use our [Places API](https://docs.predicthq.com/api/places/search-places) to search for the correct Place ID.
          type: array
          items:
            type: integer
          title: Place Ids
        formatted_address:
          type: string
          title: Formatted Address
        industry:
          description: |-
            The industry of your business. This is used to calculate the Impact Area for your location when you specify
            the `origin_geojson` field.
          $ref: '#/components/schemas/Industry'
        origin_geojson:
          description: |-
            The `origin_geojson` field is used to define the geolocation of your business.

            The difference between `origin_geojson` and `geojson` is that `origin_geojson` defines the exact location of
            your business while `geojson` defines the area around your business that impacts your business demand and
            you want to search events for.

            If you only define the `origin_geojson` field for the Saved Location and don't specify `geojson` or `place_ids`
            an Impact Area will be automatically calculated as an Isochrone Polygon and will be stored in the `geojson` field.

            Remember that GeoJSON coordinates are ordered longitude then latitude.

            Note: Refer to our [Impact Area](https://docs.predicthq.com/api/impact-area/get-impact-area)
            documentation for more details.
          $ref: '#/components/schemas/OriginGeoJson'
          examples:
            - type: Feature
              geometry:
                type: Point
                coordinates:
                  - -122.3816274
                  - 37.61911449999999
      title: CreateSavedLocationRequest
    DateRange:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/DateRangeType'
        start_dt:
          type: string
          format: date-time
          title: Start Dt
        end_dt:
          type: string
          format: date-time
          title: End Dt
      required:
        - type
        - start_dt
        - end_dt
      title: DateRange
    DateRangeType:
      type: string
      const: next_90d
      title: DateRangeType
    DayOfWeek:
      type: string
      enum:
        - monday
        - tuesday
        - wednesday
        - thursday
        - friday
        - saturday
        - sunday
      title: DayOfWeek
    GeoJson-Input:
      type: object
      properties:
        type:
          type: string
          const: Feature
          title: Type
        properties:
          $ref: '#/components/schemas/Properties'
        geometry:
          discriminator:
            propertyName: type
            mapping:
              LineString: '#/components/schemas/LineString'
              MultiLineString: '#/components/schemas/MultiLineString'
              MultiPolygon: '#/components/schemas/MultiPolygon'
              Point: '#/components/schemas/Point'
              Polygon: '#/components/schemas/Polygon'
          oneOf:
            - $ref: '#/components/schemas/Point'
            - $ref: '#/components/schemas/Polygon'
            - $ref: '#/components/schemas/MultiPolygon'
            - $ref: '#/components/schemas/LineString'
            - $ref: '#/components/schemas/MultiLineString'
          title: Geometry
      required:
        - type
        - geometry
      title: GeoJSON (Input)
    GeoJson-Output:
      type: object
      properties:
        type:
          type: string
          const: Feature
          title: Type
        properties:
          $ref: '#/components/schemas/Properties'
        geometry:
          discriminator:
            propertyName: type
            mapping:
              LineString: '#/components/schemas/LineString'
