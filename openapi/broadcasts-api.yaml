      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BroadcastCountResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
                  - $ref: '#/components/schemas/HTTPValidationError'
                  - $ref: '#/components/schemas/QueryValidationError'
              examples:
                invalidRequest:
                  summary: Invalid query parameter
                  value:
                    error: Request contains invalid data
                    details:
                      - field: query.limit
                        msg: Input should be less than or equal to 500
                        type: less_than_equal
                invalidQueryValue:
                  summary: Invalid query parameter value
                  value:
                    error:
                      - field: start.gt
                        msg: Value error, start.gt has invalid date/time value
                        type: value_error
                maxResultWindow:
                  summary: Offset exceeds max result window
                  value:
                    error: Offset greater than max value allowed (5000)
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Authorization required
        '402':
          description: Payment Required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Payment Required
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                insufficientScope:
                  summary: Insufficient token scope
                  value:
                    error: Bearer token scope insufficient
                missingSubscription:
                  summary: Missing broadcasts subscription
                  value:
                    error: Missing broadcasts subscription.
      tags:
        - Broadcasts API
components:
  parameters:
    LimitParam:
      name: limit
      in: query
      description: The number of results to return per page. Default is `10`. Maximum is `500`.
      required: false
      schema:
        type: integer
        default: 10
    OffsetParam:
      name: offset
      in: query
      description: The number of results to skip. Default is `0`. Use with `limit` for pagination.
      required: false
      schema:
        type: integer
        default: 0
  schemas:
    ActiveBroadcastRecordStatus:
      type: string
      const: active
      title: ActiveBroadcastRecordStatus
    BroadcastCountResponse:
      type: object
      properties:
        count:
          description: The total number of broadcast records matching the query.
          type: integer
          title: Count
      required:
        - count
      title: BroadcastCountResponse
    BroadcastEntityType:
      type: string
      enum:
        - venue
        - organisation
      title: BroadcastEntityType
    BroadcastEventCategory:
      type: string
      const: sports
      title: BroadcastEventCategory
    BroadcastStatus:
      type: string
      enum:
        - cancelled
        - predicted
        - scheduled
      title: BroadcastStatus
    BroadcastsResponse:
      type: object
      properties:
        count:
          description: The total number of results matching the query.
          type: integer
          title: Count
        next:
          description: URL to the next page of results, or null if this is the last page.
          anyOf:
            - type: string
            - type: 'null'
        previous:
          description: URL to the previous page of results, or null if this is the first page.
          anyOf:
            - type: string
            - type: 'null'
        overflow:
          description: Indicates whether the total count exceeds the maximum result window.
          type: boolean
          title: Overflow
        results:
          description: Array of broadcast records matching the query.
          type: array
          items:
            anyOf:
              - $ref: '#/components/schemas/PublicBroadcast'
              - $ref: '#/components/schemas/PublicDeletedBroadcast'
              - $ref: '#/components/schemas/PublicDuplicateBroadcast'
          title: Results
      required:
        - count
        - overflow
        - results
      title: BroadcastsResponse
    DeletedBroadcastRecordStatus:
      type: string
      const: deleted
      title: DeletedBroadcastRecordStatus
    DuplicateBroadcastRecordStatus:
      type: string
      const: duplicate
      title: DuplicateBroadcastRecordStatus
    GeoPoint:
      type: object
      properties:
        lon:
          description: Must be between -180.0 and 180.0
          type: number
          exclusiveMaximum: 180
          exclusiveMinimum: -180
          title: Lon
        lat:
          description: Must be between -90.0 and 90.0
          type: number
          exclusiveMaximum: 90
          exclusiveMinimum: -90
          title: Lat
      required:
        - lon
        - lat
      title: GeoPoint
    PlaceType:
      type: string
      enum:
        - admin:city:major
        - locality
        - county
      title: PlaceType
    PublicBroadcast:
      type: object
      properties:
        broadcast_id:
          description: |-
            The unique identifier.


            E.g. `u5aCvebffuNFpGSGNQFiU4`
          type: string
          title: Broadcast Id
        updated:
          description: |-
            The time the broadcast was last updated. In YYYY-MM-DDThh:mm:ssZ format.


            E.g. `2020-11-30T06:58:28Z`
          type: string
          format: date-time
          title: Updated
        first_seen:
          description: |-
            The time the broadcast was seen for the first time. In YYYY-MM-DDThh:mm:ssZ format.


            E.g. `2020-11-30T06:58:28Z`
          type: string
          format: date-time
          title: First Seen
        dates:
          description: The scheduled start time and time zone of the broadcast.
          $ref: '#/components/schemas/PublicBroadcastDate'
        location:
          description: The geographic location where the broadcast is televised, at the county level.
          $ref: '#/components/schemas/PublicBroadcastLocation'
        phq_viewership:
          description: |-
            The estimated number of people in the broadcast's location that will watch the broadcast.


            E.g. `300000`
          type: integer
          title: Phq Viewership
        record_status:
          description: |-
            The record status of the broadcast.


            Possible values:
            - active: the broadcast record is valid.
            - duplicate: the broadcast record is a duplicate of an active record.
            - deleted: the broadcast record is no longer valid.


            E.g. `active`
          $ref: '#/components/schemas/ActiveBroadcastRecordStatus'
        broadcast_status:
          description: |-
            The schedule status of the broadcast.


            Our guide on [different sport](https://docs.predicthq.com/getting-started/guides/live-tv-event-guides/find-broadcasts-for-specific-sport-types) types in the API explains when the `scheduled` and `predicted` statuses are used.


            E.g. 'scheduled'
          $ref: '#/components/schemas/BroadcastStatus'
        event:
          description: The physical event that the broadcast is linked to.
          $ref: '#/components/schemas/PublicEvent'
      required:
        - broadcast_id
        - updated
        - first_seen
        - record_status
      title: PublicBroadcast
    PublicBroadcastDate:
      type: object
      properties:
        start:
          description: |-
            The time the broadcast is scheduled to start, in UTC. In YYYY-MM-DDThh:mm:ssZ format.


            E.g. `2018-01-01T17:00:00Z`
          type: string
          format: date-time
          title: Start
        start_local:
          description: |-
            The time the broadcast is scheduled to start in the time zone of the broadcast's location. In YYYY-MM-DDThh:mm:ss format.


            E.g. `2018-01-01T12:00:00`
          type: string
          format: date-time
          title: Start Local
        timezone:
          description: |-
            The time zone of the broadcast's location. In TZ Database name format.


            E.g. `America/New_York`
          type: string
          title: Timezone
      required:
        - start
      title: PublicBroadcastDate
    PublicBroadcastLocation:
      type: object
      properties:
        geopoint:
          description: |-
            The latitude and longitude coordinates of the location where the broadcast is televised.


            **E.g.**
              ```json
              {
                "lon": -122.4425,
                "lat": 37.77823
              }
              ```
          $ref: '#/components/schemas/GeoPoint'
        place_hierarchies:
          description: |-
            An array of place hierarchies for the location where the broadcast is televised. A broadcast record is only televised in one location.


            A hierarchy is an array of place ids (see [Places](https://docs.predicthq.com/api/places/search-places)). The final id in a hierarchy is the place_id of the place where the broadcast is televised.

            **E.g.**
              ```json
              [
                [
                  "6295630",
                  "6255149",
                  "6252001",
                  "5332921",
                  "5391997"
                ]
              ]
              ```
          type: array
          items:
            items:
              type: string
            type: array
          title: Place Hierarchies
        places:
          description: |-
            An array of place details for the place where the broadcast is televised. A broadcast record is only televised in one place.

            A [CSV file of broadcast counties](https://docs.predicthq.com/api/broadcasts/search-broadcasts#mapping-file) is available. It contains the place_id and name of all counties and states in the US.
            **E.g.**
              ```json
              [
                {
                  "place_id": "5391997",
                  "type": "county",
                  "name": "San Francisco County",
                  "county": "City and County of San Francisco",
                  "region": "California",
                  "country": "US"
                }
              ]
              ```
          type: array
          items:
            $ref: '#/components/schemas/PublicPlace'
          title: Places
        country:
          description: |-
            The country code of the location where the broadcast is televised. In [ISO 3166-1 alpha-2](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2) format.


            E.g. `US`
          type: string
          title: Country
      required:
        - geopoint
        - place_hierarchies
        - places
        - country
      title: PublicBroadcastLocation
    PublicDeletedBroadcast:
      type: object
      properties:
        broadcast_id:
          description: |-
            The unique identifier.


            E.g. `u5aCvebffuNFpGSGNQFiU4`
          type: string
          title: Broadcast Id
        updated:
          description: |-
            The time the broadcast was last updated. In YYYY-MM-DDThh:mm:ssZ format.


            E.g. `2020-11-30T06:58:28Z`
          type: string
          format: date-time
          title: Updated
        first_seen:
          description: |-
            The time the broadcast was seen for the first time. In YYYY-MM-DDThh:mm:ssZ format.


            E.g. `2020-11-30T06:58:28Z`
          type: string
          format: date-time
          title: First Seen
        record_status:
          description: The record status of the broadcast. Always `deleted` for this record type.
          $ref: '#/components/schemas/DeletedBroadcastRecordStatus'
      required:
        - broadcast_id
        - updated
        - first_seen
        - record_status
      title: PublicDeletedBroadcast
    PublicDuplicateBroadcast:
      type: object
      properties:
        broadcast_id:
          description: |-
            The unique identifier.


            E.g. `u5aCvebffuNFpGSGNQFiU4`
          type: string
          title: Broadcast Id
        updated:
          description: The time the broadcast was last updated. In YYYY-MM-DDThh:mm:ssZ format.
          type: string
          format: date-time
          title: Updated
        first_seen:
          description: |-
            The time the broadcast was seen for the first time. In YYYY-MM-DDThh:mm:ssZ format.


            E.g. `2020-11-30T06:58:28Z`
          type: string
          format: date-time
          title: First Seen
        record_status:
          description: The record status of the broadcast. Always `duplicate` for this record type.
          $ref: '#/components/schemas/DuplicateBroadcastRecordStatus'
        duplicate_of_id:
          description: |-
            The active record unique identifier the current broadcast is a duplicate of. Please note that this field is only present for records with record status `duplicate`.


            E.g. `u5aCvebffuNFpGSGNQFiU4`
          type: string
          title: Duplicate Of Id
      required:
        - broadcast_id
        - updated
        - first_seen
        - record_status
        - duplicate_of_id
      title: PublicDuplicateBroadcast
    PublicEntity:
      type: object
      properties:
        entity_id:
          description: The unique identifier of the entity.
          type: string
          title: Entity Id
        type:
          description: The type of entity. Either `venue` or `organisation`.
          $ref: '#/components/schemas/BroadcastEntityType'
        name:
          description: The name of the entity.
          type: string
          title: Name
        formatted_address:
          description: The formatted address of the entity, if available.
          type: string
          title: Formatted Address
      required:
        - entity_id
        - type
        - name
      title: PublicEntity
    PublicEvent:
      type: object
      properties:
        event_id:
          description: |-
            The unique identifier of the physical event. Events in the Broadcasts API have the same identifiers as those in the Events API.


            E.g. `svbfg9xT4YSVUeeAKp`
          type: string
          title: Event Id
        title:
          description: |-
            The title of the physical event.


            E.g. `Super Bowl - 49ers vs Kansas City Chiefs`
          type: string
          title: Title
        category:
          description: |-
            The category of the physical event.


            E.g. `sports`
          $ref: '#/components/schemas/BroadcastEventCategory'
        labels:
          description: |-
            The labels associated with the physical event.


            E.g. `["american-football", "nfl", "sport"]`
          type: array
          items:
            type: string
          title: Labels
        dates:
          description: |-
            Details about the time of the physical event.


            **E.g.**
              ```json
              {
                "start": "2018-01-01T17:00:00Z",
                "end": "2018-01-01T20:43:26Z",
                "start_local": "2018-01-01T12:00:00",
                "end_local": "2018-01-01T15:43:26",
                "predicted_end_local": "2018-01-01T15:20:00",
                "timezone": "America/New_York"
              }
              ```
          $ref: '#/components/schemas/PublicEventDates'
        location:
          description: |-
            Details about the location of the physical event.


             **E.g.**
                ```json
                {
                  "geopoint": {
                    "lon": -80.23886040000002,
                    "lat": 25.9579665
                  },
                  "place_hierarchies": [
                    [
                      "6295630",
                      "6255149",
                      "6252001",
                      "4155751",
                      "4164238",
                      "4161298"
                    ]
                  ],
                  "country": "US"
                }
                ```
          $ref: '#/components/schemas/PublicEventLocation'
        entities:
          description: |-
            Venue entities linked to the physical event.


            **E.g.**
              ```json
              [
                {
                  "entity_id": "wVgG7p8ZKRKEPPrNDq4my9",
                  "type": "venue",
                  "name": "Hard Rock Stadium",
                  "formatted_address": "347 Don Shula Dr\nMiami Gardens, FL 33056\nUnited States of America"
                }
              ]
              ```
          type: array
          items:
            $ref: '#/components/schemas/PublicEntity'
          title: Entities
        phq_attendance:
          description: |-
            The number of people predicted to attend the physical event.


            E.g. `65000`
          type: integer
          title: Phq Attendance
        phq_rank:
          description: |-
            The PHQ Rank number of the physical event. PHQ Rank represents the physical event's impact independent of its geographical location.


            E.g. `100`
          type: integer
          title: Phq Rank
        local_rank:
          description: |-
            The Local Rank number of the physical event. Local Rank represents the physical event's impact on its local geographical location.


            E.g. `100`
          type: integer
          title: Local Rank
        aviation_rank:
          description: |-
            The Aviation Rank number of the physical event. Aviation Rank represents the physical event's impact on flight bookings by considering both domestic and international travel.


            E.g. `100`
          type: integer
          deprecated: true
          title: Aviation Rank
      required:
        - event_id
        - title
        - category
        - labels
        - dates
        - location
        - entities
      title: PublicEvent
    PublicEventDates:
      type: object
      properties:
        start:
          description: The start time of the physical event.
          type: string
          format: date-time
          title: Start
        end:
          description: The end time of the physical event.
          type: string
          format: date-time
          title: End
        start_local:
          description: The start time in the physical event's time zone.
          type: string
          format: date-time
          title: Start Local
        end_local:
          description: The end time in the physical event's time zone.
          type: string
          format: date-time
          title: End Local
        predicted_end_local:
          description: the time the physical event is predicted to end in the event's time zone
          type: string
          format: date-time
          title: Predicted End Local
        timezone:
          description: The time zone of the physical event.
          type: string
          title: Timezone
      required:
        - start
        - start_local
        - timezone
      title: PublicEventDates
    PublicEventLocation:
      type: object
      properties:
        geopoint:
          description: The latitude and longitude coordinates.
          $ref: '#/components/schemas/GeoPoint'
        place_hierarchies:
          description: Place hierarchies of the physical event.
          type: array
          items:
            items:
              type: string
            type: array
          title: Place Hierarchies
        country:
          description: The country code.
          type: string
          title: Country
      required:
        - geopoint
        - place_hierarchies
        - country
      title: PublicEventLocation
    PublicPlace:
      type: object
      properties:
        place_id:
          description: id of the place
          type: string
          title: Place Id
        type:
          description: The type of the place. Broadcasts are located at counties or county-equivalents.
          $ref: '#/components/schemas/PlaceType'
        name:
          description: The name of the place.
          type: string
          title: Name
        county:
          description: The name of the Place's county. This is the same as the name if the Place is a county.
          type: string
          title: County
        region:
          description: The name of the Place's region. In the US, regions represent states or federal districts.
          type: string
          title: Region
        country:
          description: The [ISO 3166-1 alpha-2](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2) country code of the Place’s country.
          type: string
          title: Country
      required:
        - place_id
        - type
        - name
        - county
        - region
        - country
      title: PublicPlace
    ErrorResponse:
      type: object
      properties:
        error:
          description: Error message
          type: string
          title: Error
      required:
        - error
      title: ErrorResponse
    ValidationErrorDetail:
      type: object
      properties:
        field:
          description: The field that failed validation
          type: string
          title: Field
        msg:
          description: The validation error message
          type: string
          title: Message
        type:
          description: The type of validation error
          type: string
          title: Error Type
      required:
        - field
        - msg
        - type
      title: ValidationErrorDetail
    HTTPValidationError:
      type: object
      properties:
        error:
          description: Error summary message
          type: string
          title: Error
        details:
          description: List of validation error details
          type: array
          items:
            $ref: '#/components/schemas/ValidationErrorDetail'
          title: Details
      required:
        - error
        - details
      title: HTTPValidationError
    QueryValidationError:
      type: object
      properties:
        error:
          description: List of query parameter validation errors
          type: array
          items:
            $ref: '#/components/schemas/ValidationErrorDetail'
          title: Error
      required:
        - error
      title: QueryValidationError
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: $API_KEY
      description: |
        Enter your PredictHQ API key. The Bearer prefix is added automatically.

        When calling the API directly, send: `Authorization: Bearer <YOUR_API_KEY>` as documented at [https://docs.predicthq.com/api/overview/authenticating](https://docs.predicthq.com/api/overview/authenticating)

