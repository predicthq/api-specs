openapi: 3.1.0
info:
  title: PredictHQ Features API
  version: 1.0.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://www.predicthq.com/legal/terms
  description: Access prebuilt Machine Learning features that will take your forecast models and results to the next level, fast. Gain access to over 100 ML-ready features that are guaranteed to improve your forecasting accuracy.
security:
  - BearerAuth: []
tags:
  - externalDocs:
      description: Features API Docs
      url: https://docs.predicthq.com/api/features/get-features
    name: Features API
servers:
  - url: https://api.predicthq.com
externalDocs:
  url: https://docs.predicthq.com
  description: PredictHQ Tech Docs
x-hideTryItPanel: true
paths:
  /v1/features/:
    post:
      operationId: get_features
      summary: Get ML Features
      description: |-
        Returns aggregated ML-ready features for the specified location and date range.

        Returns pre-built ML-ready features for the specified location and date range, aggregated per day or per week. Features are opt-in: only features included in the request body are returned.

        **Beam (recommended):** Provide a `beam` object with an `analysis_id` to automatically derive location, interval, and feature selection from a Beam analysis. This is the recommended approach. When using `beam`, you must not specify `location` or individual features separately — these are determined by the analysis.

        **Manual configuration:** If not using Beam, location must be specified via `location.geo` (lat/lon + radius), `location.place_id`, or `location.saved_location_id`, and features must be explicitly requested.

        **Feature families:** `phq_attendance_*`, `phq_impact_*`, `phq_spend_*`, and `phq_viewership_*` features return statistical summaries (`count`, `sum`, `min`, `max`, `avg`, `median`, `std_dev`) — pass `true` for defaults (`count` and `sum`), or a criteria object to customise stats and filter by `phq_rank` or `local_rank`. `phq_rank_*` features return a `rank_levels` object (counts bucketed into 5 severity levels) and are requested by setting the field to `true`.

        **Date range** (`active`) is required in all cases and uses local time. Multi-day occurrences are included for each day they are active within the range. Results are paginated with `offset` and `limit`, and can be returned as JSON or CSV via the `Accept` header.
      parameters:
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: accept
          in: header
          description: |-
            Receive results in JSON or CSV by specifying the appropriate Accept header.
                        Supported values:

                        - application/json

                        - text/csv
          required: false
          schema:
            type: string
            default: application/json
            enum:
              - application/json
              - text/csv
            title: Accept
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeaturesRequestModel'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhqFeaturesResponse'
            text/csv:
              schema:
                description: CSV export of results
                type: string
                examples:
                  - |-
                    date,feature1,feature2
                    2025-01-01,value1,value2
        '400':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
              example:
                errors:
                  error: Request contains invalid data
                  details:
                    - field: body.active.gte
                      msg: Value error, invalid active date range gte constraint
                      type: value_error
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
                  - $ref: '#/components/schemas/WrappedErrorResponse'
              examples:
                authError:
                  summary: Authentication failure
                  value:
                    error: Authorization required
                missingSubscription:
                  summary: Missing subscription
                  value:
                    errors:
                      error: Missing features-api subscription.
        '402':
          description: Payment Required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrappedErrorResponse'
              example:
                errors:
                  error: Payment Required
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Bearer token scope insufficient
        '415':
          description: Unsupported Media Type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Invalid content type, application/json expected.
      tags:
        - Features API
components:
  parameters:
    LimitParam:
      name: limit
      in: query
      description: Limit the number of results.
      required: false
      schema:
        type: integer
        default: 10
    OffsetParam:
      name: offset
      in: query
      description: Offset the results.
      required: false
      schema:
        type: integer
        default: 0
  schemas:
    ActiveDateRange:
      type: object
      properties:
        gt:
          description: Date greater than (exclusive)
          type: string
          format: date
          title: Gt
        gte:
          description: Date greater than or equal to
          type: string
          format: date
          title: Gte
        lt:
          description: Date less than (exclusive)
          type: string
          format: date
          title: Lt
        lte:
          description: Date less than or equal to
          type: string
          format: date
          title: Lte
      title: ActiveDateRange
    Beam:
      type: object
      properties:
        analysis_id:
          description: Beam analysis ID
          type: string
          minLength: 1
          title: Analysis Id
        group_id:
          description: Beam analysis group ID
          type: string
          minLength: 1
          title: Group Id
      required:
        - analysis_id
      title: Beam
    FeatureStats:
      type: object
      properties:
        count:
          description: Number of events contributing to this feature
          type: integer
          title: Count
        sum:
          description: Sum of the feature values
          type: integer
          title: Sum
        min:
          description: Minimum feature value
          type: integer
          title: Min
        max:
          description: Maximum feature value
          type: integer
          title: Max
        avg:
          description: Average feature value
          type: integer
          title: Avg
        median:
          description: Median feature value
          type: integer
          title: Median
        std_dev:
          description: Standard deviation of feature values
          type: integer
          title: Std Dev
      title: FeatureStats
    FeaturesRequestModel:
      type: object
      properties:
        active:
          description: |
            The date range to calculate features for. This is named `active` because it includes events that are active within the date range. A multi-day event might start or end outside the specified date range - the days the event is active within the specified range will be included in the calculations.

            **Supports the following fields:**
            - `gt` - greater than
            - `gte` - greater than or equal
            - `lt` - less than
            - `lte` - less than or equal

            Note that all dates here are in local time (not UTC). Features API works on specific locations.


            **E.g.**
            ```json
            {
              "active": {
                "gte": "2019-11-28",
                "lte": "2019-11-29"
              }
            }
          $ref: '#/components/schemas/ActiveDateRange'
        beam:
          description: |-
            An optional beam analysis object which if provided will calculate the `location`, `interval`, `week_start_day`, `phq_*` features and `stats`, and `phq_rank` from the Beam analysis (and optionally its group).

            **Fields:**
            - `analysis_id` (required if `beam` is present): Beam analysis ID
            - `group_id` (optional): Beam analysis group ID

            If beam.analysis_id is provided, the `location`, `interval`, `week_start_day` , `phq_*` features including `stats` and `phq_rank` will be calculated from the Beam analysis.

            **E.g.**
            ```json
            {
              "beam": {
                "analysis_id": "0SXAmHsoZo0"
              }
            }
            ```
            If both `beam.analysis_id` and `beam.group_id` are provided, all the above fields will be calculated from the Beam analysis but the `phq_*` features will be calculated from the Beam analysis Group.

            Note: This is useful for when you want to request features for a variety of locations while maintaining feature consistency by limiting the returned features to those of the group's feature importance results.

            E.g.
            ```json
                {
              "beam": {
                "analysis_id": "0SXaMHsoYo0",
                "group_id": "QxE9BcLq7ZY"
              }
            }
            ```
          $ref: '#/components/schemas/Beam'
        hour_of_day_start:
          description: |
            Time range (per day) to calculate features for.

            Note: This field is currently only supported on `phq_viewership_*` features.

            If your location only operates within certain hours of the day you can use this filter to only include records that are happening within those hours.

            Supports the following fields:
            **Fields:**
            - `gt` - greater than
            - `gte` - greater than or equal
            - `lt` - less than
            - `lte` - less than or equal

            The values are hours between 0 and 23 (i.e. 24h format).

            E.g. only include events happening between 1pm and 3pm each day.

            **E.g.**
            ```json
            {
              "hour_of_day_start": {
                "gte": 13,
                "lte": 15
              }
            }
            ```
          $ref: '#/components/schemas/HourOfDayRange'
        location:
          description: |
            Location to calculate features for. You can specify the location as a latitude/longitude (with radius), Place ID(s) or [Saved Location IDs](https://docs.predicthq.com/api/saved-locations/overview). 

            We recommend using a lat/lon+radius or a saved location id (for a point and radius location) as they could define the location of your interest more accurately. To work out a suitable radius around your location we strongly recommend using our [Suggested Radius API](https://docs.predicthq.com/api/suggested-radius/get-suggested-radius).

            Note: When using Place IDs or Saved Location IDs a maximum of 3 IDs may be used.

            Note: When using lat/lon+radius, the radius must be in the format `<radius><radius_unit>`, where `<radius>` is an integer or a float number up to 2 decimal places and `<radius_unit>` is one of:
            - `m` - meters
            - `km` - kilometers
            - `ft` - feet
            - `mi` - miles
            E.g. using Place IDs:
            ```json
                {
                  "location": {
                    "place_id": [
                      5224323,
                      5811704,
                      4887398
                    ]
                  }
                }
            ```
            E.g. using Saved Location IDs:
            ```json
                {
                  "location": {
                    "saved_location_id": [
                      "BN7ZSw8xza9FviPVfyCycd",
                      "X3uyTFbDOUaX2q_Qh5i31b",
                      "X3uyTFbDOUhrfq_Qh5i31A"
                    ]
                  }
                }
            ```
            E.g. using a latitude/longitude and radius:
            ```json
                {
                  "location": {
                    "geo": {
                      "lat": 41.75038,
                      "lon": -71.49978,
                      "radius": "2.62mi"
                    }
                  }
                }
            ```
          $ref: '#/components/schemas/Location'
        interval:
          description: |
            Aggregation interval.

            Possible values:
                **Fields:**
            - `day` (default) for daily aggregation
            - `week` for weekly aggregation
          $ref: '#/components/schemas/Interval'
        week_start_day:
          description: |
            The weekday to be treated as the start of the week.

            Possible values:
            - `monday` (default)
            - `tuesday`
            - `wednesday`
            - `thursday`
            - `friday`
            - `saturday`
            - `sunday`

            Only applicable when interval is set to week.
          $ref: '#/components/schemas/Weekday'
        predicted_events:
          description: Include or Exclude predicted events.
          $ref: '#/components/schemas/PredictedEvents'
