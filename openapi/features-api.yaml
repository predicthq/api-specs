              type: integer
              exclusiveMaximum: 100
              minimum: 0
              title: Gt
            gte:
              description: Rank greater than or equal to, 0-100
              type: integer
              maximum: 100
              minimum: 0
              title: Gte
            lt:
              description: Rank less than (exclusive), 1-100
              type: integer
              exclusiveMinimum: 0
              maximum: 100
              title: Lt
            lte:
              description: Rank less than or equal to, 0-100
              type: integer
              maximum: 100
              minimum: 0
              title: Lte
          title: RankRange
