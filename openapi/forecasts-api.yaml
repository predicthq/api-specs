          title: Label
        location:
          description: The geographic area associated with this model, defined by a Saved Location.
          $ref: '#/components/schemas/Location'
        metrics:
          description: Training and accuracy metrics for the model. Null until the model has been trained.
          anyOf:
            - $ref: '#/components/schemas/PublicMetrics'
