      title: GetModelResponse
    Industry:
      description: Choosing the right industry is important as this will determine the type of features used in the training and forecasting and will impact the accuracy of the results. We will use the applicable Predicted Impact Patterns for the specified industry.
      type: string
      enum:
        - accommodation
        - cpg
        - tourism
        - marketing
        - parking
        - restaurants
        - retail
        - transportation
        - other
      title: Industry
    InputDemandType:
      type: object
      properties:
        interval:
          description: The time interval for demand data aggregation. Currently only `day` is supported.
          $ref: '#/components/schemas/InputInterval'
        industry:
          description: Industry classification determining which Predicted Impact Patterns are applied.
          $ref: '#/components/schemas/Industry'
      title: InputDemandType
    InputInterval:
      type: string
      const: day
      title: InputInterval
    Location:
      type: object
      properties:
        saved_location_id:
          description: The unique identifier of a Saved Location defining the geographic area for this model.
          type: string
          minLength: 1
          title: Saved Location ID
      required:
        - saved_location_id
      title: Location
    PhqExplainability:
      description: List of the top events impacting demand on each date. Use this to help understand the context of how and why events are impacting your demand.
      type: object
