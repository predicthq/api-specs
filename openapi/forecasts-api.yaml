          anyOf:
            - $ref: '#/components/schemas/PublicInterval'
            - type: 'null'
        industry:
          description: Industry classification determining which Predicted Impact Patterns are applied.
          anyOf:
            - $ref: '#/components/schemas/Industry'
            - type: 'null'
      title: PublicDemandType
    PublicForecast:
      type: object
      properties:
        date:
          description: The date of the forecast value.
          type: string
          format: date
          title: Date
        forecast:
          description: The predicted demand value for the date.
          type: number
          title: Forecast
        phq_explainability:
          description: Events impacting demand on this date, ranked by impact. Only present when `phq_explainability` is passed in the `include` query parameter.
          $ref: '#/components/schemas/PhqExplainability'
        phq_features:
          description: List of the features (from our Features API) that were shown to have an impact on the demand. These features were used in training the model and for forecasting.
          type: array
