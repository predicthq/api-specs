openapi: 3.1.0
info:
  title: PredictHQ Forecasts API (Public Preview)
  version: 1.0.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://www.predicthq.com/legal/terms
  description: |
    The Forecasts API delivers fast, accurate, and scalable demand forecasts—powered by the real-world events that impact your business. Whether you’re starting from scratch or augmenting an existing model, our event-driven forecasting approach improves accuracy, unlocking significant ROI and cutting development time by months.
security:
  - BearerAuth: []
tags:
  - name: Models
    externalDocs:
      url: https://docs.predicthq.com/api/forecasts/models
      description: Models Docs
  - name: Demand Data
    externalDocs:
      url: https://docs.predicthq.com/api/forecasts/demand-data
      description: Demand Data Docs
  - name: Forecasts
    externalDocs:
      url: https://docs.predicthq.com/api/forecasts/forecasts
      description: Forecasts Docs
  - name: Algorithms
    externalDocs:
      url: https://docs.predicthq.com/api/forecasts/algos
      description: Algorithms Docs
servers:
  - url: https://api.predicthq.com
externalDocs:
  url: https://docs.predicthq.com
  description: PredictHQ Tech Docs
x-hideTryItPanel: true
paths:
  /v1/forecasts/algos:
    get:
      operationId: list_algorithms
      summary: Get Algorithms
      description: Returns the list of available forecasting algorithms. Currently one algorithm is offered (`phq-xgboost`) based on XGBoost.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAlgoResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Authorization required
        '402':
          description: Payment Required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Payment required.
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                insufficientScope:
                  summary: Insufficient token scope
                  value:
                    error: Bearer token scope insufficient
                missingSubscription:
                  summary: Missing forecasts subscription
                  value:
                    error: Missing forecasts subscription.
      tags:
        - Algorithms
  /v1/forecasts/models:
    post:
      operationId: create_model
      summary: Create Model
      description: |-
        Creates a new forecast model. You must provide a `name` and a `location` (via a Saved Location ID). Optionally specify `demand_type`, `label`, `external_id`, `forecast_window`, `algo`, and `generate_baseline`.

        After creating a model, upload historical demand data using the Create Demand Data endpoint, then trigger training.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateModelRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateModelResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
                  - $ref: '#/components/schemas/HTTPValidationError'
              examples:
                invalidRequest:
                  summary: Invalid request parameter
                  value:
                    error: Request contains invalid data
                    details:
                      - field: body.location.saved_location_id
                        msg: Field required
                        type: missing
                businessLogicError:
                  summary: Business logic error
                  value:
                    error: Saved Location not found
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Authorization required
        '402':
          description: Payment Required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Payment required.
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                insufficientScope:
                  summary: Insufficient token scope
                  value:
                    error: Bearer token scope insufficient
                missingSubscription:
                  summary: Missing forecasts subscription
                  value:
                    error: Missing forecasts subscription.
      tags:
        - Models
    get:
      operationId: list_models
      summary: Search Models
      description: Returns a paginated list of forecast models belonging to the authenticated organization. Supports full-text search across `name`, `label`, and `external_id` via the `q` parameter, and filtering by Saved Location ID and readiness status.
      parameters:
        - name: q
          in: query
          description: Fulltext search across `name`, `label` and `external_id`.
          required: false
          schema:
            type: string
        - name: location.saved_location_id
          in: query
          description: A comma-separated list of Saved Location IDs to filter on.
          required: false
          schema:
            type: array
            items:
              type: string
        - name: readiness_status
          in: query
          description: |-
            A comma-separated list of forecast model statuses to filter on.

            - `created`: Model has been created but not yet trained.
            - `preparing`: Model is locked and gathering data prior to training.
            - `training`: Model is currently being trained on uploaded demand data.
            - `forecasting`: Model is generating forecasts.
            - `ready`: Model has successfully generated forecasts and is available for queries.
            - `stale`: Model configuration or data has changed; retraining is required.
            - `failed`: Processing encountered an error.
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - created
                - failed
                - forecasting
                - preparing
                - ready
                - stale
                - training
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchModelResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/HTTPValidationError'
                  - $ref: '#/components/schemas/QueryValidationError'
              examples:
                invalidQueryParameter:
                  summary: Invalid query parameter
                  value:
                    error:
                      - field: readiness_status
                        msg: Input should be 'created', 'failed', 'forecasting', 'preparing', 'ready', 'stale' or 'training'
                        type: enum
                invalidPaginationParameter:
                  summary: Pagination limit exceeded
                  value:
                    error: Request contains invalid data
                    details:
                      - field: query.limit/offset
                        msg: Tried to fetch more results than the maximum allowed. Please reduce limit/offset.
                        type: value_error
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Authorization required
        '402':
          description: Payment Required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Payment required.
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                insufficientScope:
                  summary: Insufficient token scope
                  value:
                    error: Bearer token scope insufficient
                missingSubscription:
                  summary: Missing forecasts subscription
                  value:
                    error: Missing forecasts subscription.
      tags:
        - Models
  /v1/forecasts/models/{model_id}:
    get:
      operationId: get_model
      summary: Get Model
      description: Retrieves a single forecast model by ID, including its current readiness status, configuration, accuracy metrics, and location details.
      parameters:
        - name: model_id
          in: path
          description: The unique identifier of the forecast model.
          required: true
          schema:
            type: string
            title: Model Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetModelResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Authorization required
        '402':
          description: Payment Required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Payment required.
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                insufficientScope:
                  summary: Insufficient token scope
                  value:
                    error: Bearer token scope insufficient
                missingSubscription:
                  summary: Missing forecasts subscription
                  value:
                    error: Missing forecasts subscription.
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Model not found
      tags:
        - Models
    put:
      operationId: update_model
      summary: Replace Model
      description: Replaces the full configuration of an existing forecast model. This is a full replacement — all mutable fields should be provided. Changes to `location`, `demand_type`, `forecast_window`, `algo`, or `generate_baseline` are blocked while the model is in `preparing`, `training`, or `forecasting` status. Changing any of those fields sets the model to `stale` status, requiring re-training to take effect.
      parameters:
        - name: model_id
          in: path
          description: The unique identifier of the forecast model.
          required: true
          schema:
            type: string
            title: Model Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplaceModelRequest'
      responses:
        '204':
          description: Successful Response
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
                  - $ref: '#/components/schemas/HTTPValidationError'
              examples:
                invalidRequest:
                  summary: Invalid request parameter
                  value:
                    error: Request contains invalid data
                    details:
                      - field: body.location.saved_location_id
                        msg: Field required
                        type: missing
                businessLogicError:
                  summary: Business logic error
                  value:
                    error: Saved Location not found
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Authorization required
        '402':
          description: Payment Required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Payment required.
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                insufficientScope:
                  summary: Insufficient token scope
                  value:
                    error: Bearer token scope insufficient
                missingSubscription:
                  summary: Missing forecasts subscription
                  value:
                    error: Missing forecasts subscription.
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Model not found
      tags:
        - Models
    patch:
      operationId: patch_model
      summary: Update Model
      description: Partially updates an existing forecast model. Only the fields provided in the request body will be changed. Changes to `location`, `demand_type`, `forecast_window`, `algo`, or `generate_baseline` are blocked while the model is in `preparing`, `training`, or `forecasting` status. Changing any of those fields sets the model to `stale` status, requiring re-training to take effect.
      parameters:
        - name: model_id
          in: path
          description: The unique identifier of the forecast model.
          required: true
          schema:
            type: string
            title: Model Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateModelRequest'
      responses:
        '204':
          description: Successful Response
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
                  - $ref: '#/components/schemas/HTTPValidationError'
              examples:
                invalidRequest:
                  summary: Invalid request parameter
                  value:
                    error: Request contains invalid data
                    details:
                      - field: body.location.saved_location_id
                        msg: Field required
                        type: missing
                businessLogicError:
                  summary: Business logic error
                  value:
                    error: Saved Location not found
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Authorization required
        '402':
          description: Payment Required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Payment required.
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                insufficientScope:
                  summary: Insufficient token scope
                  value:
                    error: Bearer token scope insufficient
                missingSubscription:
                  summary: Missing forecasts subscription
                  value:
                    error: Missing forecasts subscription.
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Model not found
      tags:
        - Models
    delete:
      operationId: delete_model
      summary: Delete Model
      description: Permanently deletes a forecast model and all associated demand data and forecasts. The model must not be in `preparing`, `training`, or `forecasting` status. This action is irreversible.
      parameters:
        - name: model_id
          in: path
          description: The unique identifier of the forecast model.
          required: true
          schema:
            type: string
            title: Model Id
      responses:
        '204':
          description: Successful Response
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Current model readiness state is 'preparing', which doesn't allow deletion
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Authorization required
        '402':
          description: Payment Required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Payment required.
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                insufficientScope:
                  summary: Insufficient token scope
                  value:
                    error: Bearer token scope insufficient
                missingSubscription:
                  summary: Missing forecasts subscription
                  value:
                    error: Missing forecasts subscription.
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Model not found
      tags:
        - Models
  /v1/forecasts/models/{model_id}/demand:
    post:
      operationId: create_demand_data
      summary: Create Model Demand
      description: |-
        Uploads historical demand data for a forecast model. The model must exist and belong to the authenticated organization.

        You can use any of the following content types:
        - `application/json`: A JSON object with a `demand` array of `{date, demand}` objects.
        - `text/csv`: A CSV file with lowercase headers `date,demand` and one row per data point.
        - `application/x-ndjson`: Newline-delimited JSON where each line is a `{date, demand}` object.

        The `date` field should be in `YYYY-MM-DD` format and `demand` must be a non-negative number.
      parameters:
        - name: model_id
          in: path
          description: The unique identifier of the forecast model.
          required: true
          schema:
            type: string
            title: Model Id
        - name: Content-Type
          in: header
          description: Content type of the uploaded payload.
          required: true
          schema:
            type: string
            enum:
              - text/csv
              - application/x-ndjson
              - application/json
            examples:
              - application/json
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateModelDemandRequest'
          application/x-ndjson:
            schema:
              description: Newline-delimited JSON where each line is an object with date and demand.
              type: string
            example: |-
              {"date": "2025-01-01", "demand": 100}
              {"date": "2025-01-02", "demand": 150}
          text/csv:
            schema:
              description: CSV with lowercase headers date,demand and multiple rows of values.
              type: string
            example: |-
              date,demand
              2025-01-01,100
              2025-01-02,150
      responses:
        '201':
          description: Successful Response
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
                  - $ref: '#/components/schemas/HTTPValidationError'
              examples:
                invalidRequest:
                  summary: Invalid request parameter
                  value:
                    error: Request contains invalid data
                    details:
                      - field: body.demand[0].date
                        msg: Input should be a valid date in YYYY-MM-DD format
                        type: date_parsing
                businessLogicError:
                  summary: Business logic error
                  value:
                    error: Current model readiness state is 'training', which doesn't allow demand data upload
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Authorization required
        '402':
          description: Payment Required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Payment required.
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                insufficientScope:
                  summary: Insufficient token scope
                  value:
                    error: Bearer token scope insufficient
                missingSubscription:
                  summary: Missing forecasts subscription
                  value:
                    error: Missing forecasts subscription.
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Model not found
      tags:
        - Demand Data
    get:
      operationId: list_demand_data
      summary: Get Demand Data
      description: |-
        Returns the demand data that has been uploaded to the model. Supports filtering by date range.

        By setting the `Accept` header, you can specify the format of the response. The default is JSON.
        Supported formats: `application/json`, `text/csv`, `application/x-ndjson`.
      parameters:
        - name: model_id
          in: path
          description: The unique identifier of the forecast model.
          required: true
          schema:
            type: string
            title: Model Id
        - name: date.gt
          in: query
          description: |-
            Filters demand after the specified date (exclusive).


            Expected format: `YYYY-MM-DD`
          required: false
          schema:
            type: string
            format: date
        - name: date.gte
          in: query
          description: |-
            Filters demand on or after the specified date.


            Expected format: `YYYY-MM-DD`.


            Example: `2025-01-01`
          required: false
          schema:
            type: string
            format: date
        - name: date.lt
          in: query
          description: |-
            Filters demand before the specified date (exclusive).


            Expected format: `YYYY-MM-DD`.
          required: false
          schema:
            type: string
            format: date
        - name: date.lte
          in: query
          description: |-
            Filters demand on or before the specified date.


            Expected format: `YYYY-MM-DD`.


            Example: `2025-01-07`
          required: false
          schema:
            type: string
            format: date
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchDemandResponse'
            application/x-ndjson:
              schema:
                type: string
              example: |-
                {"date": "2025-01-01", "demand": 100.0}
                {"date": "2025-01-02", "demand": 150.0}
            text/csv:
              schema:
                type: string
              example: |-
                date,demand
                2025-01-01,100.0
                2025-01-02,150.0
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/HTTPValidationError'
                  - $ref: '#/components/schemas/QueryValidationError'
              examples:
                invalidQueryParameter:
                  summary: Invalid query parameter
                  value:
                    error:
                      - field: date.gte
                        msg: Input should be a valid date in YYYY-MM-DD format
                        type: date_parsing
                invalidPaginationParameter:
                  summary: Pagination limit exceeded
                  value:
                    error: Request contains invalid data
                    details:
                      - field: query.limit/offset
                        msg: Tried to fetch more results than the maximum allowed. Please reduce limit/offset.
                        type: value_error
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Authorization required
        '402':
          description: Payment Required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Payment required.
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                insufficientScope:
                  summary: Insufficient token scope
                  value:
                    error: Bearer token scope insufficient
                missingSubscription:
                  summary: Missing forecasts subscription
                  value:
                    error: Missing forecasts subscription.
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Model not found
      tags:
        - Demand Data
  /v1/forecasts/models/{model_id}/forecast:
    get:
      operationId: get_forecast
      summary: Get Forecast
      description: Returns the generated forecast results for a trained model. Each result includes a date and predicted demand value. Supports filtering by date range.
      parameters:
        - name: model_id
          in: path
          description: The unique identifier of the forecast model.
          required: true
          schema:
            type: string
            title: Model Id
        - name: date.gt
          in: query
          description: |-
            Filters forecast results after the specified date (exclusive).


            Expected format: `YYYY-MM-DD`
          required: false
          schema:
            type: string
            format: date
        - name: date.gte
          in: query
          description: |-
            Filters forecast results on or after the specified date.


            Expected format: `YYYY-MM-DD`.


            Example: `2025-01-01`
          required: false
          schema:
            type: string
            format: date
        - name: date.lt
          in: query
          description: |-
            Filters forecast results before the specified date (exclusive).


            Expected format: `YYYY-MM-DD`.
          required: false
          schema:
            type: string
            format: date
        - name: date.lte
          in: query
          description: |-
            Filters forecast results on or before the specified date.


            Expected format: `YYYY-MM-DD`.


            Example: `2025-01-07`
          required: false
          schema:
            type: string
            format: date
        - name: include
          in: query
          description: |-
            A comma-separated list of additional fields to include in each forecast result. By default these fields are omitted:

            - `phq_features`: The demand intelligence features used in training and forecasting.
            - `phq_explainability`: The top events impacting demand on each forecasted date.
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - phq_features
                - phq_explainability
            title: Include
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchModelForecastResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
                  - $ref: '#/components/schemas/HTTPValidationError'
                  - $ref: '#/components/schemas/QueryValidationError'
              examples:
                invalidQueryParameter:
                  summary: Invalid query parameter
                  value:
                    error:
                      - field: date.gte
                        msg: Input should be a valid date in YYYY-MM-DD format
                        type: date_parsing
                invalidPaginationParameter:
                  summary: Pagination limit exceeded
                  value:
                    error: Request contains invalid data
                    details:
                      - field: query.limit/offset
                        msg: Tried to fetch more results than the maximum allowed. Please reduce limit/offset.
                        type: value_error
                businessLogicError:
                  summary: Business logic error
                  value:
                    error: PHQ explainability is not enabled on your subscription.
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Authorization required
        '402':
          description: Payment Required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Payment required.
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                insufficientScope:
                  summary: Insufficient token scope
                  value:
                    error: Bearer token scope insufficient
                missingSubscription:
                  summary: Missing forecasts subscription
                  value:
                    error: Missing forecasts subscription.
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Model not found
      tags:
        - Forecasts
  /v1/forecasts/models/{model_id}/train:
    post:
      operationId: train_model
      summary: Train Model
      description: |-
        Triggers training for the specified forecast model. The model must have demand data uploaded and be in a state that allows training (e.g. `ready` or `created` with demand data).

        Training runs asynchronously — poll the model's `readiness.status` field to monitor progress.
      parameters:
        - name: model_id
          in: path
          description: The unique identifier of the forecast model.
          required: true
          schema:
            type: string
            title: Model Id
      responses:
        '204':
          description: Successful Response
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Current model readiness state is 'preparing', which doesn't allow triggering training
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Authorization required
        '402':
          description: Payment Required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Payment required.
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                insufficientScope:
                  summary: Insufficient token scope
                  value:
                    error: Bearer token scope insufficient
                missingSubscription:
                  summary: Missing forecasts subscription
                  value:
                    error: Missing forecasts subscription.
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Model not found
      tags:
        - Models
components:
  parameters:
    LimitParam:
      name: limit
      in: query
      description: The maximum number of results to return per page. Defaults to `10`.
      required: false
      schema:
        type: integer
        default: 10
    OffsetParam:
      name: offset
      in: query
      description: The number of results to skip before returning. Used for pagination. Defaults to `0`.
      required: false
      schema:
        type: integer
        default: 0
  schemas:
    Accuracy:
      description: Forecast accuracy metrics calculated by comparing predicted values against actual historical values. These metrics help assess how well the model is performing.
      type: object
      properties:
        mape:
          description: Mean Absolute Percentage Error (MAPE). Represents the average absolute percentage difference between forecasted and actual values. Lower values indicate more accurate predictions.
          type: number
        mae:
          description: Mean Absolute Error (MAE). The average of the absolute differences between forecasted and actual values. Useful for understanding the average magnitude of errors in the forecast.
          type: number
        rmse:
          description: Root Mean Squared Error (RMSE). Measures the square root of the average squared differences between forecasted and actual values. It penalizes larger errors more heavily than MAE.
          type: number
        wape:
          description: WAPE quantifies the total forecast error as a percentage of the total actual demand. Unlike MAPE, which gives equal weight to each data point, WAPE weights each error by the size of the actual value. This makes it less sensitive to very small actual values, so it's a more reliable measure of accuracy in some situations.
          type: number
      required:
        - mape
        - mae
        - rmse
        - wape
    Algo:
      type: object
      properties:
        algo:
          description: Algorithm identifier.
          type: string
          const: phq-xgboost
        description:
          description: Human-readable description of the algorithm.
          type: string
          minLength: 1
        status:
          description: Current availability status of the algorithm.
          type: string
          default: current
          enum:
            - beta
            - current
            - deprecated
          minLength: 1
      required:
        - algo
    AlgoType:
      type: string
      const: phq-xgboost
    CreateModelRequest:
      type: object
      properties:
        name:
          description: Name for the forecast model.
          type: string
          minLength: 1
        external_id:
          description: External identifier for the forecast model. If you have an ID for the location/store/property/product-group in your other platforms, use the same ID here to easily connect this specific forecast model.
          type: string
          minLength: 1
        forecast_window:
          description: Number of days into the future to forecast.
          $ref: '#/components/schemas/ForecastWindowDay'
        generate_baseline:
          description: When `true`, generates a baseline model using historical demand data only - without PredictHQ demand intelligence - for benchmarking accuracy against the enhanced model.
          type: boolean
          default: false
          title: Generate Baseline Model
        label:
          description: Set of labels you can use to better identify or group your forecast models.
          type: array
          items:
            type: string
            minLength: 1
          minItems: 1
        location:
          description: |-
            Location of your business so we can identify relevant events around the
            location impacting the demand.


            Please create a Saved Location first, that can be reused across multiple forecast
            models if needed.
          $ref: '#/components/schemas/Location'
        algo:
          description: Currently we offer one algorithm based on XGBoost. In the future we may offer additional algos.
          type: string
          default: phq-xgboost
          const: phq-xgboost
        demand_type:
          description: Configuration for the demand data type including the industry and time interval.
          $ref: '#/components/schemas/InputDemandType'
      additionalProperties: false
      required:
        - name
        - location
      title: CreateModelRequest
    CreateModelResponse:
      type: object
      properties:
        errors:
          description: List of error messages, if any.
          type: array
          items:
            type: string
          default: []
          title: Errors
        warnings:
          description: List of warning messages, if any.
          type: array
          items:
            type: string
          default: []
          title: Warnings
        model_id:
          description: Unique identifier for the newly created forecast model.
          type: string
          minLength: 1
          title: Model Id
      required:
        - model_id
      title: CreateModelResponse
    DateRange:
      type: object
      properties:
        start:
          description: Start date of the range.
          type: string
          format: date
          title: Start
        end:
          description: End date of the range.
          type: string
          format: date
          title: End
      required:
        - start
        - end
      title: DateRange
    DemandDataMetrics:
      type: object
      properties:
        date_range:
          description: The date range covered by the uploaded demand data.
          $ref: '#/components/schemas/DateRange'
      required:
        - date_range
      title: DemandDataMetrics
    Event:
      type: object
      properties:
        id:
          description: Unique identifier of the event.
          type: string
          minLength: 1
          title: Id
        category:
          description: Category classification of the event (e.g. `conferences`, `sports`, `concerts`).
          type: string
          minLength: 1
          title: Category
        title:
          description: Display name of the event as it appears in the PredictHQ event catalog.
          type: string
          minLength: 1
          title: Title
        start_local:
          description: Start date and time of the event in local time.
          type: string
          format: date-time
          title: Start
        end_local:
          description: End date and time of the event in local time.
          type: string
          format: date-time
          title: End
        phq_rank:
          description: PHQ Rank score from 0–100 indicating the predicted attendance impact of the event.
          type: integer
          maximum: 100
          minimum: 0
          title: PHQ Rank
        local_rank:
          description: Local Rank score from 0–100 indicating relative local significance. Null for non-attended events.
          anyOf:
            - type: integer
              maximum: 100
              minimum: 0
            - type: 'null'
          title: Local Rank
      required:
        - id
        - title
        - category
        - start_local
        - end_local
      title: Event
    Feature:
      type: object
      properties:
        name:
          description: Name of the demand intelligence feature.
          type: string
          minLength: 1
          title: Name
        value:
          description: Numeric value of the feature's contribution to the forecast.
          type: number
          title: Value
      required:
        - name
        - value
      title: Feature
    ForecastWindowDay:
      type: string
      enum:
        - 1d
        - 7d
        - 14d
        - 28d
        - 30d
        - 60d
        - 90d
      title: ForecastWindowDay
    GetAlgoResponse:
      type: object
      properties:
        errors:
          description: List of error messages, if any.
          type: array
          items:
            type: string
          default: []
          title: Errors
        warnings:
          description: List of warning messages, if any.
          type: array
          items:
            type: string
          default: []
          title: Warnings
        results:
          description: List of available forecasting algorithms.
          type: array
          items:
            $ref: '#/components/schemas/Algo'
          title: Results
      title: GetAlgoResponse
    GetModelResponse:
      type: object
      properties:
