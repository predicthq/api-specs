        model_id:
          description: Unique identifier for the forecast model.
          type: string
          minLength: 1
          title: Model Id
        name:
          description: Name of the forecast model.
          type: string
          minLength: 1
          title: Name
        readiness:
          description: Current readiness status of the model indicating where it is in the training/forecasting lifecycle.
